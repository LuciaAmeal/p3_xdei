services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    ports:
      - "1883:1883"
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  mongo:
    image: mongo:4.4
    ports:
      - "27017:27017"
    command: ["--bind_ip_all", "--nojournal"]
    volumes:
      - mongo_data:/data/db

  orion-ld:
    image: ${ORION_IMAGE:-fiware/orion-ld:latest}
    command: ["-dbhost", "mongo"]
    environment:
      - CONTEXT_BROKER_HOST=0.0.0.0
      - ORIONLD_MONGO_HOST=mongo
    ports:
      - "1026:1026"
    depends_on:
      mongo:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1026/version"]
      interval: 10s
      timeout: 5s
      retries: 10

  iot-agent-json:
    image: ${IOT_AGENT_IMAGE:-fiware/iotagent-json:1.16.0}
    environment:
      - IOTA_CB_HOST=orion-ld
      - IOTA_CB_PORT=1026
      - IOTA_CB_NGSI_VERSION=ld
      - IOTA_NORTH_PORT=4041
      - IOTA_REGISTRY_TYPE=memory
      - IOTA_MQTT_HOST=mosquitto
      - IOTA_MQTT_PORT=1883
      - IOTA_DEFAULT_KEY=1234
      - IOTA_DEFAULT_TRANSPORT=MQTT
      - IOTA_PROVIDER_URL=http://iot-agent-json:4041
      - IOTA_JSON_LD_CONTEXT=https://uri.etsi.org/ngsi-ld/v1/ngsi-ld-core-context.jsonld
    ports:
      - "4041:4041"
    depends_on:
      orion-ld:
        condition: service_started
      mosquitto:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4041/iot/about"]
      interval: 10s
      timeout: 5s
      retries: 10

  crate:
    image: crate:4.6.3
    ports:
      - "4200:4200"
    volumes:
      - crate_data:/var/lib/crate
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  grafana:
    image: grafana/grafana:9.4.7
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SECURITY_ALLOW_EMBEDDING=true
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      crate:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    image: xdei/backend:stub
    ports:
      - "8000:8000"
    environment:
      - MQTT_HOST=mosquitto
      - ORION_HOST=orion-ld
      - ORION_PORT=1026
      - QUANTUMLEAP_HOST=quantumleap
      - FIWARE_SERVICE=smartgondor
      - FIWARE_SERVICEPATH=/gardens
      - GTFS_ZIP_PATH=/data/urban_mobility_a_coruna/urban_mobility_a_coruna_gtfs.zip
    volumes:
      - ./data:/data:ro
    depends_on:
      orion-ld:
        condition: service_started
      mosquitto:
        condition: service_started
      quantumleap:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  vehicle-bridge:
    build: ./backend
    image: xdei/backend:stub
    command: ["python", "vehicle_bridge.py"]
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - ORION_URL=http://orion-ld:1026
      - IOTA_AGENT_URL=http://iot-agent-json:4041
      - BRIDGE_DEFAULT_KEY=1234
      - FIWARE_SERVICE=smartgondor
      - FIWARE_SERVICEPATH=/gardens
    depends_on:
      mosquitto:
        condition: service_started
      orion-ld:
        condition: service_started
      iot-agent-json:
        condition: service_started

  simulator:
    build: ./backend
    image: xdei/backend:stub
    command: ["python", "dynamic_simulator.py", "/data/urban_mobility_a_coruna/urban_mobility_a_coruna_gtfs.zip"]
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - FIWARE_SERVICE=smartgondor
      - FIWARE_SERVICEPATH=/gardens
    volumes:
      - ./data:/data:ro
    depends_on:
      mosquitto:
        condition: service_started
      backend:
        condition: service_started

  quantumleap:
    image: ${QUANTUMLEAP_IMAGE:-orchestracities/quantumleap:1.0.0}
    environment:
      - CRATE_HOST=crate
      - CRATE_PORT=4200
    ports:
      - "8668:8668"
    depends_on:
      crate:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8668/version"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build: ./frontend
    image: xdei/frontend:stub
    ports:
      - "8081:80"
    environment:
      - BACKEND_BASE_URL=http://localhost:8000

volumes:
  mongo_data:
  crate_data:
  grafana_data:
  mosquitto_data:
  mosquitto_log:
